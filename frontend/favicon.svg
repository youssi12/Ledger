<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: rounded square, midnight violet -->
  <rect width="64" height="64" rx="14" fill="#160029"/>

  <!-- Ledger page split into two columns -->
  <!-- Center divider -->
  <line x1="32" y1="14" x2="32" y2="50" stroke="#55227f" stroke-width="2"/>

  <!-- Debit column lines (left) -->
  <rect x="12" y="18" width="14" height="3.5" rx="1.5" fill="#d44d5c"/>
  <rect x="12" y="26" width="10" height="3.5" rx="1.5" fill="#d44d5c" opacity="0.6"/>
  <rect x="12" y="34" width="14" height="3.5" rx="1.5" fill="#d44d5c" opacity="0.6"/>
  <rect x="12" y="42" width="8"  height="3.5" rx="1.5" fill="#d44d5c" opacity="0.4"/>

  <!-- Credit column lines (right) -->
  <rect x="38" y="18" width="10" height="3.5" rx="1.5" fill="#e3b5a4" opacity="0.6"/>
  <rect x="38" y="26" width="14" height="3.5" rx="1.5" fill="#e3b5a4"/>
  <rect x="38" y="34" width="8"  height="3.5" rx="1.5" fill="#e3b5a4" opacity="0.4"/>
  <rect x="38" y="42" width="14" height="3.5" rx="1.5" fill="#e3b5a4" opacity="0.6"/>
</svg>
